server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: resumiq-backend

  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/resumeiq}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Gufran@21}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:resumiq-super-secret-jwt-key-that-is-long-enough-for-hs256-algorithm-2024}
    expiration-ms: 86400000
    issuer: resumiq

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.resumiq: INFO
    org.hibernate.SQL: WARN
